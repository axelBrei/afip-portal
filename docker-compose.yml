services:
  postgres:
    image: postgres:18-alpine
    container_name: afip-postgres
    networks:
      - internal-net
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dbname"]
      interval: 5s
      timeout: 5s
      retries: 10
  afip-portal:
    container_name: afip-portal
    build: .
    command: sh -c "./node_modules/.bin/drizzle-kit push && node server.js"
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - certs:/data/certs
    networks:
      - coolify
      - internal-net
    environment:
      - DATABASE_URL=postgres://${PG_USER}:${PG_PASSWORD}@${PG_HOST}:${PG_PORT}/${PG_DB}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  certs:

networks:
  internal-net:
  coolify:
    external: true
