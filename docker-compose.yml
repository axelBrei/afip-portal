services:
  postgres:
    image: postgres:18-alpine
    container_name: afip-postgres
    networks:
      - internal-net
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
  afip-portal:
    container_name: afip-portal
    build: .
    command: sh -c "./node_modules/.bin/drizzle-kit push && node server.js"
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - certs:/data/certs
    networks:
      - coolify
      - internal-net
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${PG_USER}:${PG_PASSWORD}@${PG_HOST}:${PG_PORT}/${PG_DB}
      - HOSTNAME=0.0.0.0
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  certs:

networks:
  internal-net:
  coolify:
    external: true
