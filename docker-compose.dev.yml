services:
  postgres:
    image: postgres:18-alpine
    container_name: afip_postgres
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: dbname
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dbname"]
      interval: 5s
      timeout: 5s
      retries: 10
  afip-portal:
    build:
      context: .
      target: dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - certs:/data/certs
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://user:pass@postgres:5432/dbname
    command: sh -c "npx drizzle-kit push && npm run dev"

volumes:
  certs:
